name: Test

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC

permissions:
  contents: read

jobs:
  test:
    name: Build and run tests (MSVC / x64)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Build test project (Release|x64)
        run: |
          msbuild src\fc.sln `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /m `
            /nologo `
            /verbosity:minimal

      - name: Run tests
        run: |
          $psi = [System.Diagnostics.ProcessStartInfo]::new("src\x64\Release\fc.test.exe")
          $psi.UseShellExecute = $false
          $psi.RedirectStandardOutput = $false
          $psi.RedirectStandardError = $false
          $p = [System.Diagnostics.Process]::Start($psi)
          $p.WaitForExit()
          if ($p.ExitCode -ne 0) {
            Write-Error "Tests failed with exit code $($p.ExitCode)"
            exit $p.ExitCode
          }
